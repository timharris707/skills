# board (seat -> provider, model, lens, reasoning)
board:
  - seat: claude
    provider: Anthropic
    model: claude-opus-4-8
    lens: First principles & economics — does the core logic and the math hold up
    reasoning: xhigh
  - seat: codex
    provider: OpenAI
    model: gpt-5.5
    lens: Execution & feasibility — can this org actually do it, with what and by when
    reasoning: xhigh
  - seat: gemini
    provider: Google
    model: gemini-3-pro-preview
