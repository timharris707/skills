schema: advisory-board/run-recipe@1
title: v1.13 fixit revision artifact design brief
date: 2026-07-02

# run shape
mode: advisory
sensitivity: redacted
rounds: "2"
max_rounds: 3
cross_reading: summaries
lens: software-architecture
output: full-handoff
out_dir: examples/dogfood-fixit-design-roundtable

# prompt template (bump/hash changes when the egressed prompt shape changes)
prompt_template: advisory-board/round1@2
prompt_template_sha256: 27f5d18e3de3d13bfbce812ba2e9d9ee2d9239d9b3bc03c08dd2f3323538c57d

# synthesizer (M2): spawn a no-lens seat after rounds to draft verdict.json
synthesize: true
synthesizer_seat: null
synthesizer_template: advisory-board/synthesizer@2
synthesizer_template_sha256: 45b369761090907f3dbac017c8393a829ea4bba5378cc294f624b4fe375cf008

# source
source_kind: path
source_ref: examples/dogfood-fixit-design-roundtable/design-brief.md
source_bytes: 17299
source_lines: 142
