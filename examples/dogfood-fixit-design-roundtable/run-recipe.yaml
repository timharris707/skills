# board (seat -> provider, model, lens, reasoning)
board:
  - seat: claude
    provider: Anthropic
    model: claude-opus-4-8
    lens: Architecture & systems — design soundness, invariants, failure modes, adversarial review
    reasoning: max
  - seat: codex
    provider: OpenAI
    model: gpt-5.5
    lens: Implementation & testing — repo-grounded execution, migration, test strategy, edge cases
    reasoning: xhigh
  - seat: gemini
    provider: Google
    model: gemini-3.5-flash
    lens: Product & operations — rollout, latency, observability, evaluation, user-workflow risk
    reasoning: HIGH

# egress (consent is bound to the content hash in egress-manifest.md)
egress_consent: tiered
egress_providers:
  - claude seat -> Anthropic
  - codex seat -> OpenAI
  - gemini seat -> Google

# isolation posture (follows mode); 'partial' = some seats not network-isolated
isolation_network: "on"
isolation_network_unenforced:
isolation_filesystem: open
